name: Send Firebase Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Xabar sarlavhasi'
        required: true
      body:
        description: 'Xabar matni'
        required: true

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Send Notification
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node -e '
            const admin = require("firebase-admin");
            const serviceAccount = JSON.parse(process.env.FIREBASE_CONFIG);
            admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
            admin.messaging().send({
              notification: { title: "${{ github.event.inputs.title }}", body: "${{ github.event.inputs.body }}" },
              topic: "all"
            }).then(() => console.log("Xabar yuborildi!")).catch(console.error);
          '
