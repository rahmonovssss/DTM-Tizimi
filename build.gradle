buildscript {
    repositories {
        google() 
        // jcenter() ni olib tashladik
        mavenCentral() // O'rniga buni qo'shdik (bu hozirgi standart)
    }
    dependencies {
        // Android Gradle plugin
        classpath 'com.android.tools.build:gradle:4.0.1' 
        
        // Firebase Google Services plagin
        classpath 'com.google.gms:google-services:4.3.15' 
    }
}

allprojects {
    repositories {
        google() 
        // Bu yerdan ham jcenter() ni olib tashladik
        mavenCentral()
    }
}
