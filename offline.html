<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* Harakatlanuvchi rangli fon */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Shisha effekti (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 85%;
            max-width: 400px;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        h2 { color: white; margin-bottom: 15px; font-weight: 600; }
        p { color: rgba(255,255,255,0.8); margin-bottom: 30px; font-size: 14px; }

        .btn {
            background: white;
            color: #e73c7e;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.9);
        }
</style>
  </head>
  <body>

    <div class="glass-card">
	  <div class="icon">🌐</div>
	  <h2>Bog'lanish mavjud emas</h2>
	  <p>Iltimos, internetingizni tekshiring. Sahifani yangilash orqali ilovaga qaytishingiz mumkin.</p>
	  <button class="btn" onclick="tryAgain()">QAYTA YUKLASH</button>
    </div>

<script>
        function tryAgain() {
            // Bir oz animatsiya effektidan keyin qayta yuklaydi
            document.querySelector('.btn').innerHTML = "Yuklanmoqda...";
            setTimeout(() => {
                location.reload();
            }, 500);
        }
</script>
  </body>
</html>
